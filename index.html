<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <header class="profile-card">
        <img id="avatar" src="" alt="Profile Avatar" class="avatar" style="display: none;">
        <h1 id="name">Loading...</h1>
        <p id="bio" class="bio"></p>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-value" id="followers">0</span>
            <span class="stat-label">followers</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="following">0</span>
            <span class="stat-label">following</span>
          </div>
        </div>
        <div class="account-meta">
          <p id="total-repos">-- repositories</p>
          <p id="total-stars">-- stars</p>
          <p id="joined-date">Joined --</p>
        </div>
        <a id="github-link" href="#" target="_blank" class="github-link" style="display: none;">View Profile</a>
      </header>

      <section class="sidebar-section">
        <h3>Languages</h3>
        <div id="languages-container" class="languages-vertical"></div>
      </section>

      <section class="sidebar-section">
        <h3>Top Topics</h3>
        <div id="topics-container" class="topics-cloud"></div>
      </section>
    </aside>

    <main class="main-content">
      <section class="content-section">
        <div class="section-header">
          <h2>Account Insights</h2>
        </div>
        <div id="insights-container" class="insights-grid">
          <div class="insight-card">
            <span class="insight-label">Contributions</span>
            <span class="insight-value" id="insight-contributions">--</span>
          </div>
          <div class="insight-card">
            <span class="insight-label">Pull Requests</span>
            <span class="insight-value" id="insight-prs">--</span>
          </div>
          <div class="insight-card">
            <span class="insight-label">Issues</span>
            <span class="insight-value" id="insight-issues">--</span>
          </div>
          <div class="insight-card">
            <span class="insight-label">Storage Used</span>
            <span class="insight-value" id="insight-storage">--</span>
          </div>
        </div>
      </section>

      <section class="content-section">
        <div class="section-header">
          <h2>Contribution History</h2>
          <span id="total-contributions" class="badge">-- total</span>
        </div>
        <div class="calendar-wrapper">
          <div id="calendar-container" class="calendar-grid"></div>
          <div class="calendar-footer">
            <span>Less</span>
            <div class="calendar-legend">
              <div style="background-color: #161b22"></div>
              <div style="background-color: #0e4429"></div>
              <div style="background-color: #006d32"></div>
              <div style="background-color: #26a641"></div>
              <div style="background-color: #39d353"></div>
            </div>
            <span>More</span>
          </div>
        </div>
      </section>

      <section class="content-section">
        <div class="section-header">
          <h2>Top Repositories</h2>
        </div>
        <div id="repos-container" class="repos-grid"></div>
      </section>

      <section class="content-section">
        <div class="section-header">
          <h2>Recent Activity</h2>
        </div>
        <div id="activity-container" class="activity-timeline-horizontal"></div>
      </section>
    </main>

    <footer>
      <p id="last-fetched" class="last-fetched"></p>
    </footer>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
