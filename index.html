<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="profile-header">
      <img id="avatar" src="" alt="Profile Avatar" class="avatar" style="display: none;">
      <div class="profile-info">
        <h1 id="name">Loading...</h1>
        <p id="bio" class="bio"></p>
        <div class="stats">
          <span id="followers"></span>
          <span id="following"></span>
        </div>
        <a id="github-link" href="#" target="_blank" class="github-link" style="display: none;">View on GitHub</a>
      </div>
    </header>

    <main>
      <section class="section">
        <h2>Language Distribution</h2>
        <div id="languages-container" class="languages-container"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2>Repositories</h2>
          <span id="repo-count" class="badge"></span>
        </div>
        <div id="repos-container" class="repos-grid"></div>
      </section>
    </main>

    <footer>
      <p id="last-fetched" class="last-fetched"></p>
    </footer>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
